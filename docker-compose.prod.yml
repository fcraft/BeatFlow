# 生产部署模式：直接拉取 Docker Hub 预构建镜像，无需本地编译
#
# 使用方法：
#   cp .env.example .env           # 首次使用，务必修改所有密码
#   docker-compose -f docker-compose.prod.yml up -d
#
# 更新到最新版本：
#   docker-compose -f docker-compose.prod.yml pull
#   docker-compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: beat-flow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-beat_flow}
      POSTGRES_USER: ${POSTGRES_USER:-beat_flow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required, copy .env.example to .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    networks:
      - beat-flow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-beat_flow_user} -d ${POSTGRES_DB:-beat_flow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: fcraft/beatflow-backend:${IMAGE_TAG:-latest}
    container_name: beat-flow-backend
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-beat_flow_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-beat_flow}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required, copy .env.example to .env}
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - LOCAL_STORAGE_PATH=/app/storage
      - CORS_ORIGINS=${CORS_ORIGINS:-["*"]}
      # worker 数 = CPU 核心数，内存不足时设为 1
      - UVICORN_WORKERS=${UVICORN_WORKERS:-1}
    volumes:
      - media_storage:/app/storage
      - uploads:/app/uploads
    ports:
      - "3090:3090"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - beat-flow-network
    restart: unless-stopped

  frontend:
    image: fcraft/beatflow-frontend:${IMAGE_TAG:-latest}
    container_name: beat-flow-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - beat-flow-network
    restart: unless-stopped

networks:
  beat-flow-network:
    driver: bridge

volumes:
  postgres_data:
  media_storage:
  uploads:
