# 开发 / 本地构建模式：从源码构建镜像
# 生产部署请使用 docker-compose.prod.yml
#
# 使用方法：
#   cp .env.example .env   # 首次使用，按需修改 .env
#   docker-compose up -d --build

services:
  postgres:
    image: postgres:15-alpine
    container_name: beat-flow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-beat_flow}
      POSTGRES_USER: ${POSTGRES_USER:-beat_flow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required, copy .env.example to .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    # 不对外暴露端口，仅内网访问
    # 如需本地调试数据库，临时改为 "127.0.0.1:5432:5432"
    expose:
      - "5432"
    networks:
      - beat-flow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-beat_flow_user} -d ${POSTGRES_DB:-beat_flow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: beat-flow-backend
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-beat_flow_user}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:-beat_flow}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?JWT_SECRET_KEY is required, copy .env.example to .env}
      - STORAGE_TYPE=${STORAGE_TYPE:-local}
      - LOCAL_STORAGE_PATH=/app/storage
      - CORS_ORIGINS=${CORS_ORIGINS:-["*"]}
      - UVICORN_WORKERS=${UVICORN_WORKERS:-1}
    volumes:
      - media_storage:/app/storage
      - uploads:/app/uploads
    ports:
      - "3090:3090"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - beat-flow-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: beat-flow-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - beat-flow-network
    restart: unless-stopped

networks:
  beat-flow-network:
    driver: bridge

volumes:
  postgres_data:
  media_storage:
  uploads:
